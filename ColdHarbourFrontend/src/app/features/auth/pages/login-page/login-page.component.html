<div class="login-page">
  <div class="login-card">
    <div class="login-card-header">
      <h1 class="login-title">COLD<br />HARBOUR</h1>
    </div>

    <form
      class="login-form"
      [formGroup]="form"
      (ngSubmit)="submit()"
      novalidate
    >
      <app-form-field
        label="Email"
        forId="login-email"
        [errorMessage]="emailError()"
      >
        <app-input
          id="login-email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="you@example.com"
        />
      </app-form-field>

      <app-form-field
        label="Password"
        forId="login-password"
        [errorMessage]="passwordError()"
      >
        <app-input
          id="login-password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </app-form-field>

      @if (error()) {
        <div class="login-error" role="alert">{{ error() }}</div>
      }

      <app-button
        variant="primary"
        type="submit"
        class="submit-btn"
        [disabled]="loading()"
        [loading]="loading()"
      >
        Sign In
      </app-button>
    </form>
  </div>
</div>
