<section class="not-found">
  <div class="not-found__stamp">
    <span class="not-found__tag">// SIGNAL LOST</span>
  </div>

  <div class="not-found__stage">
    <h1 class="not-found__code" aria-label="404 not found">
      <span class="not-found__digit">4</span>
      <span class="not-found__digit not-found__digit--accent">0</span>
      <span class="not-found__digit">4</span>
    </h1>

    <p class="not-found__headline">PAGE NOT FOUND.</p>
    <p class="not-found__copy">
      The harbour can't find what you asked for. Maybe a stale link, maybe a
      mistyped URL — either way, nothing's playing on this dock.
    </p>
  </div>

  <footer class="not-found__deck">
    <app-button variant="primary" (click)="goHome()">
      ← Back to harbour
    </app-button>
  </footer>
</section>
