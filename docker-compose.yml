services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    depends_on:
      - api

  api:
    build: ./ColdHarbourBackend/
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - COLDHARBOUR_CONTENT_ROOT=/content
      - COLDHARBOUR_BOOTSTRAP_EMAIL=${COLDHARBOUR_BOOTSTRAP_EMAIL}
      - COLDHARBOUR_BOOTSTRAP_PASSWORD=${COLDHARBOUR_BOOTSTRAP_PASSWORD}
      - COLDHARBOUR_JWT_SIGNING_KEY=${COLDHARBOUR_JWT_SIGNING_KEY}
      - COLDHARBOUR_JWT_ISSUER=coldharbour
      - COLDHARBOUR_JWT_AUDIENCE=coldharbour-web
      - COLDHARBOUR_PUBLIC_ORIGIN=${COLDHARBOUR_PUBLIC_ORIGIN}
      - COLDHARBOUR_WS_MAX_FRAME_BYTES=${COLDHARBOUR_WS_MAX_FRAME_BYTES:-1048576}
      - COLDHARBOUR_WS_MAX_QUEUE_SIZE=${COLDHARBOUR_WS_MAX_QUEUE_SIZE:-1000}
    volumes:
      - coldharbour_content:/content
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  coldharbour_content:
