<section class="library-page">
  <!-- ── Compact header strip ── -->
  <header class="library-page__header">
    <app-back-button variant="inverse" />
    <div class="library-page__id">
      <h1 class="library-page__title">LIBRARY</h1>
      <span class="library-page__stats">
        // {{ trackCount() }} TRACKS · {{ albumCount() }} ALBUMS
      </span>
    </div>
  </header>

  <!-- ── Single control deck: search · sort toggle · actions ── -->
  <div class="deck">
    <div class="deck__cell deck__cell--search">
      <span class="deck__label">SEARCH</span>
      <app-input
        type="search"
        placeholder="Track or artist…"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
      />
    </div>

    <button
      type="button"
      class="deck__cell deck__cell--sort-toggle sort-toggle"
      [class.sort-toggle--open]="sortOpen()"
      (click)="toggleSort()"
    >
      <span class="deck__label">SORT</span>
      <span class="sort-toggle__value">{{ activeSortLabel() }}</span>
      <span class="sort-toggle__chevron">{{ sortOpen() ? '▲' : '▼' }}</span>
    </button>

    <div class="deck__cell deck__cell--actions">
      <app-library-actions [compact]="true" />
    </div>
  </div>

  <!-- ── Togglable sort options panel ── -->
  @if (sortOpen()) {
    <div class="sort-panel" role="listbox" aria-label="Sort by">
      @for (col of sortColumns; track col.key) {
        <button
          type="button"
          class="sort-option"
          [class.sort-option--active]="sortColumn() === col.key"
          [attr.aria-selected]="sortColumn() === col.key"
          (click)="selectSort(col.key)"
        >
          <span class="sort-option__label">{{ col.label }}</span>
          <span class="sort-option__glyph">{{ glyphFor(col.key) }}</span>
        </button>
      }
    </div>
  }

  <!-- ── Track list ── -->
  <div class="library-page__list">
    <app-music-list
      [musics]="visibleTracks()"
      [emptyMessage]="emptyMessage()"
    />
  </div>
</section>
